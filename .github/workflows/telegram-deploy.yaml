name: GitOps Value Update via Telegram

# 외부 API 호출(repository_dispatch)을 받으면 작동
on:
  repository_dispatch:
    types: [telegram-approved] # 💡 우리가 지정한 이벤트 이름

jobs:
  modify-yaml:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Target Deployment Repository
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/mak-argocd-deploy'
        token: ${{ secrets.GITOPS_TOKEN }}
        path: 'deploy-repo'

    - name: Update values.yaml using yq
      env:
        # 환경변수로 안전하게 먼저 빼두기
        RECOMMENDED_REPLICAS: ${{ github.event.client_payload.recommended_replicas }}
        IMAGE_TAG: ${{ github.event.client_payload.image_tag }}
      run: |
        cd deploy-repo
        
        # 1. Replica 변경 (값이 들어온 경우에만)
        if [ -n "$RECOMMENDED_REPLICAS" ]; then
          yq -i ".replicaCount = env(RECOMMENDED_REPLICAS)" charts/mak-app/values.yaml
        fi

        # 2. Image Tag 변경 (값이 들어온 경우에만)
        if [ -n "$IMAGE_TAG" ]; then
          # 소수점 변환 로직
          export CONVERTED_TAG=$(awk "BEGIN {printf \"%.1f\", $IMAGE_TAG * 0.1}")
          yq -i ".image.tag = env(CONVERTED_TAG) | .image.tag style=\"double\"" charts/mak-app/values.yaml
        fi
        
        echo "=== 수정된 values.yaml 내용 확인 ==="
        cat charts/mak-app/values.yaml

    - name: Commit and Push to Deploy Repository
      run: |
        cd deploy-repo
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add charts/mak-app/values.yaml
        if ! git diff --cached --quiet; then
          git commit -m "Chg: [GitOps] 텔레그램 승인 기반 배포 설정 변경 (tag/replicas)"
          git push origin main
          echo "성공적으로 배포 저장소에 푸시되었습니다!"
        else
          echo "변경된 내용이 없어 푸시를 생략합니다."
        fi
