# KRR кҙҖмёЎ м „мҡ© DeploymentмҷҖ Serviceмһ…лӢҲлӢӨ. кё°ліё м• н”ҢлҰ¬мјҖмқҙм…ҳ л°°нҸ¬м—җлҠ” нҸ¬н•Ёлҗҳм§Җ м•Ҡмңјл©°,
# deploy.shм—җм„ң мӮ¬мҡ©н•ң лҸҷмқјн•ң image URIлЎң replace-meлҘј м№ҳнҷҳн•ң л’Ө н•„мҡ”н•ң мӢңлӮҳлҰ¬мҳӨл§Ң м Ғмҡ©н•©лӢҲлӢӨ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-fastapi-baseline
  namespace: sample-fastapi
  labels:
    app.kubernetes.io/name: sample-fastapi
    workload-type: baseline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-fastapi
      workload-type: baseline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-fastapi
        workload-type: baseline
    spec:
      containers:
        - name: fastapi
          image: sample-fastapi:replace-me
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sample-fastapi-config
            - secretRef:
                name: sample-fastapi-load-test
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: sample-fastapi-baseline
  namespace: sample-fastapi
  labels:
    app.kubernetes.io/name: sample-fastapi
    workload-type: baseline
spec:
  selector:
    app.kubernetes.io/name: sample-fastapi
    workload-type: baseline
  ports:
    - name: http
      port: 8000
      targetPort: http
---
