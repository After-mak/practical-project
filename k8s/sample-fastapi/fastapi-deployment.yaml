apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-fastapi
  namespace: sample-fastapi
  labels:
    app.kubernetes.io/name: sample-fastapi
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-fastapi
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-fastapi
        app.kubernetes.io/component: api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fastapi
          # deploy.sh가 실제 ECR Image URI와 불변 Tag로 교체한 뒤 적용합니다.
          image: sample-fastapi:replace-me
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sample-fastapi-config
            - secretRef:
                name: sample-fastapi-load-test
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
