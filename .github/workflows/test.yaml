name: GitOps Value Update via Telegram

# 💡 수동 버튼을 없애고, 외부 API 호출(repository_dispatch)을 받으면 작동하도록 변경
on:
  repository_dispatch:
    types: [telegram-approved] # 💡 우리가 지정한 이벤트 이름

jobs:
  modify-yaml:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Target Deployment Repository
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/mak-argocd-deploy'
        token: ${{ secrets.GITOPS_TOKEN }}
        path: 'deploy-repo'

    - name: Update values.yaml using yq
      run: |
        cd deploy-repo
        
        # 💡 텔레그램 봇 백엔드가 보낸 파라미터(client_payload)를 안전하게 매핑
        yq -i ".replicaCount = ${{ github.event.client_payload.recommended_replicas }}" charts/mak-app/values.yaml
        
        echo "=== 수정된 values.yaml 내용 확인 ==="
        cat charts/mak-app/values.yaml

    - name: Commit and Push to Deploy Repository
      run: |
        cd deploy-repo
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add charts/mak-app/values.yaml
        if ! git diff --cached --quiet; then
          git commit -m "Chg: [GitOps] 패턴 분석 기반 replicaCount 자동 변경 (by Telegram Approval)"
          git push origin main
          echo "성공적으로 배포 저장소에 푸시되었습니다!"
        else
          echo "변경된 내용이 없어 푸시를 생략합니다."
        fi