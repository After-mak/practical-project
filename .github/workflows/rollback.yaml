name: Auto Rollback (Git Revert)

on:
  workflow_dispatch: # 텔레그램이나 GitHub UI에서 API로 호출할 수 있게 설정
    inputs:
      reason:
        description: '롤백 사유'
        required: false
        default: 'ChatOps Triggered Rollback'
  repository_dispatch: # 텔레그램 봇 웹훅 호출
    types: [telegram-rollback]

jobs:
  revert-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Deployment Repository
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/mak-argocd-deploy'
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}
          fetch-depth: 0 # 이전 커밋 이력을 가져오기 위해 0으로 설정

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 핵심: values.yaml을 변경한 마지막 배포 커밋만 되돌림 (HEAD가 다른 변경일 위험 회피)
      - name: Revert Last Deploy Commit
        run: |
          LAST_DEPLOY_SHA=$(git log --author="github-actions[bot]" -1 --format=%H -- charts/mak-app/values.yaml)
          if [ -z "$LAST_DEPLOY_SHA" ]; then
            echo "❌ charts/mak-app/values.yaml을 변경한 배포 커밋을 찾지 못했습니다."
            exit 1
          fi
          echo "Reverting deploy commit: $LAST_DEPLOY_SHA"
          git revert --no-edit "$LAST_DEPLOY_SHA"

      - name: Push Reverted Commit
        run: git push origin main