apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-worker
  namespace: sample-fastapi
  labels:
    app.kubernetes.io/name: sample-fastapi
    app.kubernetes.io/component: worker
spec:
  # Queue Length 3을 먼저 검증한 후 deploy.sh 안내에 따라 1개로 확장합니다.
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-fastapi
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-fastapi
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # API와 동일한 ECR 이미지를 사용하고 실행 명령만 Worker로 변경합니다.
          image: sample-fastapi:replace-me
          imagePullPolicy: Always
          command:
            - python
          args:
            - worker.py
          envFrom:
            - configMapRef:
                name: sample-fastapi-config
          ports:
            - name: metrics
              containerPort: 9100
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
