apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-redis-auth
  namespace: default
spec:
  secretTargetRef:
  - parameter: password
    # 🎯 종원님이 생성할(혹은 이미 있는) Redis용 Secret 이름과 Key 매핑
    name: redis-password-secret 
    key: redis-password
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: finops-tg-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tg-gateway-deployment  # 종원님이 배포할 텔레그램 디플로이먼트 이름과 일치
  
  minReplicaCount: 1 
  maxReplicaCount: 5 
  cooldownPeriod: 300 

  triggers:
  - type: redis
    metadata:
      host: redis-master.default.svc.cluster.local:6379
      listName: telegram_webhook_queue  
      listLength: "5"            # 🎯 조금 더 민감하게 반응하도록 '5'로 조정 추천
    authenticationRef:
      name: keda-redis-auth       # 🎯 위에서 정의한 인증 설정과 연동