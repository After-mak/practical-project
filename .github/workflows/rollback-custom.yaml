name: Custom Tag Rollback

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: '롤백할 Target Tag (예: 1.0)'
        required: true
        default: '1.0'

jobs:
  custom-rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Deployment Repository
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/mak-argocd-deploy'
          ref: main
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image.tag in values.yaml
        run: |
          # yq나 sed를 사용해 charts/mak-app/values.yaml 안의 tag 변경
          sed -i 's/tag: .*/tag: "${{ github.event.inputs.target_tag }}"/' charts/mak-app/values.yaml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(rollback): Rollback image.tag to ${{ github.event.inputs.target_tag }}"
          git push origin main